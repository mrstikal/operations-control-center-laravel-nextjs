
services:
  postgres:
    image: postgres:16-alpine
    container_name: occ-postgres
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5440}:5432"
    environment:
      POSTGRES_DB: operations_control_center
      POSTGRES_USER: occ_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U occ_user -d operations_control_center"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - occ-network

  redis:
    image: redis:7-alpine
    container_name: occ-redis
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "[ \"$(redis-cli -a \"$${REDIS_PASSWORD}\" ping)\" = \"PONG\" ]"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - occ-network

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: occ-mailhog
    ports:
      - "127.0.0.1:${MAILHOG_SMTP_PORT:-1025}:1025"
      - "127.0.0.1:${MAILHOG_UI_PORT:-8025}:8025"
    networks:
      - occ-network

volumes:
  postgres_data:
  redis_data:

networks:
  occ-network:
    driver: bridge

